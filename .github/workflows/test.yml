name: tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4 # emulators need JRE
        with:
          distribution: "temurin"
          java-version: "21"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install -g firebase-tools

      - run: pip install -e ".[dev]"

      - name: Generate dummy service account for emulator auth
        run: |
          openssl genrsa -out /tmp/key.pem 2048
          python - <<'EOF'
          import json
          key = open('/tmp/key.pem').read()
          sa = {
              "type": "service_account",
              "project_id": "scout-test",
              "private_key_id": "ci-dummy",
              "private_key": key,
              "client_email": "ci@scout-test.iam.gserviceaccount.com",
              "client_id": "0",
              "token_uri": "https://oauth2.googleapis.com/token",
          }
          json.dump(sa, open('/tmp/sa.json', 'w'))
          EOF

      - name: Start emulators + run tests
        env:
          FIREBASE_CREDENTIALS_PATH: /tmp/sa.json
        run: |
          firebase emulators:exec --project=scout-test \
            --only=firestore,auth,storage \
            "pytest --cov=app --cov-report=term-missing"

  deploy:
    needs: test
    # Only deploy on a direct push to main (not on PRs), after tests pass.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required to mint the OIDC token for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy scout-backend \
            --source . \
            --region us-west2 \
            --project scout-497021 \
            --quiet
